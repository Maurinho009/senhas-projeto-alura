<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerador de Senhas</h1>
        
        <div class="result-container">
            <span id="password-display">Sua senha aparecerá aqui</span>
            <button id="copy-btn" title="Copiar senha">📋</button>
        </div>

        <div class="settings">
            <div class="setting">
                <label for="length">Tamanho da senha (<span id="length-val">16</span>):</label>
                <input type="range" id="length" min="8" max="32" value="16">
            </div>
            
            <div class="setting">
                <label>
                    <input type="checkbox" id="uppercase" checked> Incluir Letras Maiúsculas
                </label>
            </div>

            <div class="setting">
                <label>
                    <input type="checkbox" id="lowercase" checked> Incluir Letras Minúsculas
                </label>
            </div>

            <div class="setting">
                <label>
                    <input type="checkbox" id="numbers" checked> Incluir Números
                </label>
            </div>

            <div class="setting">
                <label>
                    <input type="checkbox" id="symbols" checked> Incluir Símbolos
                </label>
            </div>
        </div>

        <button id="generate-btn" class="btn-large">Gerar Senha Forte</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
